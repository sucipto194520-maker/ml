<!DOCTYPE html>
<html>
<head>
    <title>Redirecting...</title>
    <script>
        window.onload = function() {
            // Ganti dengan URL Scheme aplikasi tujuanmu
            // Contoh untuk Mobile Legends biasanya menggunakan scheme spesifik mereka, atau store link jika belum install
            var appScheme = "mobilelegends://"; 
            var playStoreKey = "com.mobile.legends";
            var fallbackUrl = "https://google.com" + playStoreKey;

            // Mencoba membuka aplikasi
            window.location.href = appScheme;

            // Jika aplikasi tidak ada, pindahkan ke Play Store setelah 2 detik
            setTimeout(function() {
                window.location.href = fallbackUrl;
            }, 2000);
        };
    </script>
</head>
<body>
    <p>Membuka aplikasi, mohon tunggu...</p>
</body>
</html>
